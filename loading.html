<!DOCTYPE html>
<html>
<head>
    <title>Chargement...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url("https://media.ouest-france.fr/v1/pictures/MjAyNDAxN2YwNGZmYzJlOWZmODlmNjlkZWMwYjllMTRkODBhYWY?width=1260&height=708&focuspoint=50%2C25&cropresize=1&client_id=bpeditorial&sign=6bbc49a79e6a9a156a92f85bd61c696f2fabfaa97b73605e30784de7ce2be13b") no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        .content {
            position: absolute;
            top: 40%;
            width: 100%;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        p {
            font-size: 22px;
        }

        .bar {
            width: 50%;
            height: 20px;
            background: rgba(255,255,255,0.2);
            margin: 30px auto;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: #00ffcc;
            animation: load 10s linear infinite;
        }

        @keyframes load {
            0% {width: 0%;}
            100% {width: 100%;}
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
    <h1>Bienvenue sur le serveur</h1>
    <p>Chargement en cours...</p>
    <p>Discord : wiiiiillliam</p>

    <div class="bar">
        <div class="progress"></div>
    </div>
</div>

</body>
</html>
